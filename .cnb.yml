# ============================================================
# CNB 配置：CI 自动构建镜像 + 仅预览模式（点开即玩）
# ============================================================

# --- CI 流水线：push 到 main 时自动构建并推送 Docker 镜像到 CNB 制品库 ---
main:
  push:
    - stages:
        - name: build-and-push
          script: |
            docker build -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest .
            docker push   ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
          services:
            - docker

# --- 仅预览模式：访客点右上角按钮直接玩游戏，不进 IDE ---
$:
  vscode:
    - runner:
        cpus: 4
      services:
        - docker
        - name: vscode
          options:
            onlyPreview: true                                       # 跳过 IDE，直接出预览页
            launch: docker run -d --network host ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
            keepAliveTimeout: 3600000                               # 1 小时无访问回收容器（毫秒）
            daemon: true
