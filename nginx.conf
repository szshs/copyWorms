server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ===== Godot 4 多线程必需的跨域隔离头 =====
    # 你项目的 export_presets.cfg 开启了 ensure_cross_origin_isolation_headers
    # 必须由服务器返回这两个头，否则 SharedArrayBuffer 不可用，多线程会失效
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ===== gzip 压缩，减小 wasm/pck 传输体积 =====
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/wasm
        application/javascript
        text/html
        text/css
        application/octet-stream;

    # ===== 正确的 MIME 类型（Godot Web 导出需要） =====
    types {
        text/html                             html htm;
        application/javascript                js;
        application/wasm                      wasm;
        application/octet-stream              pck;
        image/png                             png;
        image/svg+xml                         svg svgz;
        image/jpeg                            jpg jpeg;
        audio/ogg                             ogg;
        audio/mpeg                            mp3;
        text/css                              css;
        font/woff                             woff;
        font/woff2                            woff2;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
