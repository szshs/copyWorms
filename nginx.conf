server {
    listen 8686;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ===== Godot 4 必需的头信息 =====
    # export_presets.cfg 中 ensure_cross_origin_isolation_headers = true
    # 服务端必须返回这两个头，否则 SharedArrayBuffer 不可用
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ===== Gzip 压缩（显著加快 .wasm .pck .js 下载速度） =====
    gzip on;
    gzip_vary on;
    gzip_types
        application/wasm
        application/octet-stream
        application/javascript
        text/html
        text/css;
    gzip_min_length 1000;
    gzip_proxied any;

    # ===== MIME 类型（Godot Web 导出必需） =====
    types {
        text/html                             html htm;
        application/javascript                js;
        application/wasm                      wasm;
        application/octet-stream              pck;
        image/png                             png;
        image/svg+xml                         svg svgz;
        image/jpeg                            jpg jpeg;
        audio/ogg                             ogg;
        audio/mpeg                            mp3;
        text/css                              css;
        font/woff                             woff;
        font/woff2                            woff2;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
